name: Python Tests with PostgreSQL

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cosc471_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          pip install pytest psycopg2-binary  # Ensure core deps are present

      - name: Wait for PostgreSQL to be ready
        run: sleep 10 

      - name: Run pytest
        env:
          TEST_DB_HOST: localhost
          TEST_DB_PORT: ${{ job.services.postgres.ports[5432] }}
          TEST_DB_NAME: cosc471_test
          TEST_DB_USER: postgres
          TEST_DB_PASSWORD: letmein
        run: pytest dw-ingestion-api/tests/ -v --tb=short

      - name: Upload test results (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: |
            junit/*.xml
            coverage.xml   
          retention-days: 7
