name: Python Tests with PostgreSQL

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cosc471_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          pip install pytest psycopg2-binary

      - name: Wait for PostgreSQL to be ready
        run: sleep 10

      - name: Initialize test database schema
        run: |
          psql -h localhost -U postgres -d cosc471_test <<'EOF'
          CREATE SCHEMA IF NOT EXISTS staging;

          CREATE TABLE IF NOT EXISTS staging.market_data_5m (
              symbol VARCHAR NOT NULL,
              ts TIMESTAMPTZ NOT NULL,
              open NUMERIC,
              high NUMERIC,
              low NUMERIC,
              close NUMERIC,
              volume BIGINT,
              asset_type VARCHAR,
              source VARCHAR,
              created_at TIMESTAMPTZ DEFAULT CURRENT_TIMESTAMP,
              PRIMARY KEY (symbol, ts)
          );

          CREATE TABLE IF NOT EXISTS staging.missing_timeslots (
              timeslot TIMESTAMPTZ NOT NULL,
              symbol TEXT NOT NULL,
              detected_at TIMESTAMPTZ DEFAULT CURRENT_TIMESTAMP,
              simulation_run TEXT,
              PRIMARY KEY (timeslot, symbol)
          );

          -- Optional: Add other tables if necessary
          EOF
        env:
          PGPASSWORD: postgres

      - name: Run pytest
        env:
          TEST_DB_HOST: localhost
          TEST_DB_PORT: ${{ job.services.postgres.ports[5432] }}
          TEST_DB_NAME: cosc471_test
          TEST_DB_USER: postgres
          TEST_DB_PASSWORD: postgres
        run: pytest dw-ingestion-api/tests/ -v --tb=short

      - name: Upload test results (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: |
            junit/*.xml
          retention-days: 7
