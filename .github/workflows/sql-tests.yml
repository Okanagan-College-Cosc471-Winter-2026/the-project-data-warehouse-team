name: SQL Integration Tests

on:
  push:
    branches: [ main, feature/* ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cosc471_test
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Wait for PostgreSQL to be ready
        run: |
          until pg_isready -h localhost -p 5432 -U postgres; do
            echo "Waiting for PostgreSQL..."
            sleep 2
          done

      - name: Create test database (idempotent)
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d postgres -c "CREATE DATABASE cosc471_test;" || true

      - name: Bootstrap schema
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d cosc471_test -f setup/00_bootstrap_schema.sql

      - name: Reset warehouse and create procedure
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d cosc471_test -f setup/01_reset_warehouse.sql
          psql -h localhost -U postgres -d cosc471_test -f setup/02_create_procedure.sql

      - name: Run all SQL integration tests
        env:
          PGPASSWORD: postgres
        run: |
          set -euo pipefail
          cd dw-ingestion-api/tests/sql_unit_tests
          for file in *.sql; do
            echo "::group::$(basename "$file")"
            psql -h localhost -U postgres -d cosc471_test -f "$file" || exit 1
            echo "::endgroup::"
          done
